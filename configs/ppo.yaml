# configs/ppo.yaml
# Hiperparámetros PPO

algorithm: "ppo"

ppo_params:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize_advantage: true

policy_kwargs:
  net_arch:
    pi: [256, 256]
    vf: [256, 256]
  activation_fn: "ReLU"
  ortho_init: true

training:
  total_timesteps: 500000
  eval_frequency: 10000
  n_eval_episodes: 5
  save_freq: 50000
  seed: 42
