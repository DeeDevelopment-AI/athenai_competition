# configs/sac.yaml
# Hiperparámetros SAC

algorithm: "sac"

sac_params:
  learning_rate: 3.0e-4
  buffer_size: 100000
  learning_starts: 1000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  ent_coef: "auto"
  target_entropy: "auto"
  train_freq: 1
  gradient_steps: 1

policy_kwargs:
  net_arch:
    pi: [256, 256]
    qf: [256, 256]
  activation_fn: "ReLU"

training:
  total_timesteps: 500000
  eval_frequency: 10000
  n_eval_episodes: 5
  save_freq: 50000
  seed: 42
